name: Lua Lint

on:
  push:
    branches: [main]
    paths:
      - 'plugin/**'
      - '.github/workflows/lua-lint.yml'
      - 'selene.toml'
      - 'lightroom.yml'
      - '.mise.toml'
  pull_request:
    branches: [main]
    paths:
      - 'plugin/**'
      - '.github/workflows/lua-lint.yml'
      - 'selene.toml'
      - 'lightroom.yml'
      - '.mise.toml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  selene:
    name: Lint Lightroom plugin (Lua)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up mise
        uses: jdx/mise-action@f10502fc09dadecfefb962fff68ce77213930204 # v4.2.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run selene
        run: mise run lua:lint
